<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorCal FTC Sponsors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #5b8fff;
      --accent2: #ff6b4a;
      --text: #f0f0f8;
      --muted: #6b6b88;
      --tag-bg: rgba(91,143,255,0.12);
      --tag-border: rgba(91,143,255,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,143,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,143,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    h1 span { color: var(--accent); }

    .header-sub {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    .header-meta {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .meta-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .meta-chip strong { color: var(--text); font-weight: 500; }

    .controls {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 380px;
    }

    .search-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.6rem 0.9rem 0.6rem 2.2rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }

    .count-label {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .layout {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      position: sticky;
      top: 0;
      height: calc(100vh - 220px);
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .sponsor-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .sponsor-row:last-child { border-bottom: none; }
    .sponsor-row:hover { opacity: 0.65; }

    .sponsor-rank {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--muted);
      min-width: 18px;
    }

    .sponsor-bar-wrap {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .sponsor-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    .sponsor-name-text {
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    .sponsor-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--accent);
      min-width: 18px;
      text-align: right;
    }

    .team-grid {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 1rem;
      align-content: start;
    }

    .team-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      transition: border-color 0.2s, transform 0.15s;
    }

    .team-card:hover {
      border-color: rgba(91,143,255,0.3);
      transform: translateY(-1px);
    }

    .team-card.highlight { border-color: var(--accent); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .team-number {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--accent);
    }

    .team-name {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.2;
      margin-top: 0.15rem;
    }

    .team-city {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .rank-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      padding: 0.18rem 0.45rem;
      border-radius: 4px;
      background: rgba(255,107,74,0.1);
      border: 1px solid rgba(255,107,74,0.2);
      color: var(--accent2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sponsors-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.7rem;
    }

    .sponsor-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      color: var(--accent);
    }

    .sponsor-tag.highlighted {
      background: rgba(91,143,255,0.25);
      border-color: var(--accent);
    }

    .no-sponsors {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 0.7rem;
      font-style: italic;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.85rem;
      padding-top: 0.7rem;
      border-top: 1px solid var(--border);
    }

    .sponsor-count-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
    }

    .website-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .website-link:hover { color: var(--accent); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      grid-column: 1/-1;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results {
      grid-column: 1/-1;
      padding: 4rem;
      text-align: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
    }

    .error-box {
      grid-column: 1/-1;
      margin: 2rem;
      padding: 1.25rem;
      background: rgba(255,107,74,0.07);
      border: 1px solid rgba(255,107,74,0.2);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--accent2);
      line-height: 1.7;
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer span {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">FIRST Tech Challenge · 2024–25 Season · USCANO</div>
  <h1>NorCal FTC <span>Sponsors</span></h1>
  <p class="header-sub">Sponsor data for all teams in the California Northern region</p>
  <div class="header-meta" id="headerMeta">
    <span class="meta-chip">Loading…</span>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="searchInput" placeholder="Search team name, number, or sponsor…" />
  </div>

  <select id="sortSelect">
    <option value="rank">Sort: by rank</option>
    <option value="name">Sort: A–Z</option>
    <option value="sponsors">Sort: most sponsors</option>
    <option value="rookie">Sort: oldest team</option>
  </select>

  <select id="filterSelect">
    <option value="all">All teams</option>
    <option value="sponsored">Has sponsors</option>
    <option value="unsponsored">No sponsors listed</option>
    <option value="top50">Top 50 ranked</option>
  </select>

  <span class="count-label" id="countLabel">— teams</span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">Top sponsors by team count</div>
    <div id="sponsorLeaderboard">
      <div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted)">Loading…</div>
    </div>
  </aside>

  <main>
    <div class="team-grid" id="teamGrid">
      <div class="loading">
        <div class="spinner"></div> loading sponsor data…
      </div>
    </div>
  </main>
</div>

<footer>
  <span>Data from <a href="https://ftc-events.firstinspires.org/2025/region/USCANO" target="_blank">FIRST Inspires</a> · Updated weekly via GitHub Actions</span>
  <span>NorCal FTC · <a href="https://github.com/haligoat/norcal-ftc-sponsors" target="_blank">View source ↗</a></span>
</footer>

<script>
  let allTeams = [];
  let freqData = [];

  async function loadData() {
    try {
      const [sponsorsRes, freqRes] = await Promise.all([
        fetch('data/sponsors.json'),
        fetch('data/sponsor_frequency.json')
      ]);

      if (!sponsorsRes.ok) throw new Error('Could not load sponsors.json — run the scraper first.');

      const sponsorsData = await sponsorsRes.json();
      allTeams = sponsorsData.teams || [];
      freqData = freqRes.ok ? await freqRes.json() : [];

      updateHeaderMeta(sponsorsData.meta);
      renderLeaderboard();
      renderTeams();
    } catch (err) {
      document.getElementById('teamGrid').innerHTML = `
        <div class="error-box">
          <strong>Could not load data.</strong><br/><br/>
          ${err.message}
        </div>`;
      document.getElementById('sponsorLeaderboard').innerHTML =
        '<span style="font-family:\'DM Mono\',monospace;font-size:0.72rem;color:var(--muted)">no data</span>';
    }
  }

  function updateHeaderMeta(meta) {
    if (!meta) return;
    const d = meta.generatedAt
      ? new Date(meta.generatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
      : 'unknown';
    document.getElementById('headerMeta').innerHTML = `
      <span class="meta-chip">Region <strong>${meta.region || 'USCANO'}</strong></span>
      <span class="meta-chip">Season <strong>${meta.season || '2025'}</strong></span>
      <span class="meta-chip">Teams <strong>${meta.totalTeams || allTeams.length}</strong></span>
      <span class="meta-chip">With sponsors <strong>${meta.teamsWithSponsors || allTeams.filter(t => t.sponsors.length > 0).length}</strong></span>
      <span class="meta-chip">Updated <strong>${d}</strong></span>
    `;
  }

  function renderLeaderboard() {
    const top = freqData.slice(0, 30);
    if (!top.length) {
      document.getElementById('sponsorLeaderboard').innerHTML =
        '<span style="font-family:\'DM Mono\',monospace;font-size:0.72rem;color:var(--muted)">no data</span>';
      return;
    }
    const max = top[0].count;
    document.getElementById('sponsorLeaderboard').innerHTML = top.map((s, i) => `
      <div class="sponsor-row" onclick="filterBySponsor(${JSON.stringify(s.name)})" title="Filter by ${s.name}">
        <span class="sponsor-rank">${i + 1}</span>
        <div class="sponsor-bar-wrap">
          <div class="sponsor-bar" style="width:${Math.round((s.count / max) * 100)}%"></div>
        </div>
        <span class="sponsor-name-text">${s.name}</span>
        <span class="sponsor-count">${s.count}</span>
      </div>
    `).join('');
  }

  function filterBySponsor(name) {
    const input = document.getElementById('searchInput');
    if (input.value.toLowerCase() === name.toLowerCase()) {
      input.value = '';
    } else {
      input.value = name;
    }
    renderTeams();
  }

  function getFilteredSorted() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const sort = document.getElementById('sortSelect').value;
    const filter = document.getElementById('filterSelect').value;

    let teams = [...allTeams];

    if (filter === 'sponsored')   teams = teams.filter(t => t.sponsors.length > 0);
    if (filter === 'unsponsored') teams = teams.filter(t => t.sponsors.length === 0);
    if (filter === 'top50')       teams = teams.filter(t => t.rank && t.rank <= 50);

    if (q) {
      teams = teams.filter(t => {
        const hay = [t.name, t.id, t.city, ...t.sponsors].join(' ').toLowerCase();
        return hay.includes(q);
      });
    }

    if (sort === 'rank') {
      teams.sort((a, b) => {
        if (a.rank && b.rank) return a.rank - b.rank;
        if (a.rank) return -1;
        if (b.rank) return 1;
        return a.name.localeCompare(b.name);
      });
    } else if (sort === 'name') {
      teams.sort((a, b) => a.name.localeCompare(b.name));
    } else if (sort === 'sponsors') {
      teams.sort((a, b) => b.sponsors.length - a.sponsors.length);
    } else if (sort === 'rookie') {
      teams.sort((a, b) => (a.rookieYear || 9999) - (b.rookieYear || 9999));
    }

    return teams;
  }

  function renderTeams() {
    const teams = getFilteredSorted();
    const q = document.getElementById('searchInput').value.toLowerCase().trim();

    document.getElementById('countLabel').textContent =
      `${teams.length} team${teams.length !== 1 ? 's' : ''}`;

    if (!teams.length) {
      document.getElementById('teamGrid').innerHTML =
        '<div class="no-results">No teams match your search.</div>';
      return;
    }

    document.getElementById('teamGrid').innerHTML = teams.map(t => {
      const isTop = t.rank && t.rank <= 10;

      const rankBadge = t.rank
        ? `<span class="rank-badge">#${t.rank}${t.opr ? ' · ' + t.opr.toFixed(1) + ' OPR' : ''}</span>`
        : '';

      const sponsorTags = t.sponsors.length
        ? `<div class="sponsors-list">${t.sponsors.map(s => {
            const hi = q && s.toLowerCase().includes(q);
            return `<span class="sponsor-tag${hi ? ' highlighted' : ''}">${s}</span>`;
          }).join('')}</div>`
        : '<p class="no-sponsors">no sponsors listed</p>';

      const websiteLink = t.website
        ? `<a class="website-link" href="${t.website}" target="_blank" rel="noopener">website ↗</a>`
        : '<span class="website-link">—</span>';

      return `
        <div class="team-card${isTop ? ' highlight' : ''}">
          <div class="card-top">
            <div>
              <div class="team-number">TEAM ${t.id}</div>
              <div class="team-name">${t.name}</div>
              <div class="team-city">${t.city}${t.rookieYear ? ' · est. ' + t.rookieYear : ''}</div>
            </div>
            ${rankBadge}
          </div>
          ${sponsorTags}
          <div class="card-footer">
            <span class="sponsor-count-label">${t.sponsors.length} sponsor${t.sponsors.length !== 1 ? 's' : ''}</span>
            ${websiteLink}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('searchInput').addEventListener('input', renderTeams);
  document.getElementById('sortSelect').addEventListener('change', renderTeams);
  document.getElementById('filterSelect').addEventListener('change', renderTeams);

  loadData();
</script>
</body>
</html>
